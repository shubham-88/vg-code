
version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: vg-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres-vg
      POSTGRES_PASSWORD: postgres-vg
      POSTGRES_DB: postgres
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  postgres_data:
