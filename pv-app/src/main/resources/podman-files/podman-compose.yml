version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: vg-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres-vg
      POSTGRES_PASSWORD: postgres-vg
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
